name: Daily Content OS

on:
  schedule:
    # Her Gece 02:10 UTC (TR 05:10)
    - cron: "10 2 * * *"
  workflow_dispatch: {}

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Content OS Pipeline Calistir
        id: pipeline
        continue-on-error: true
        run: python automation_pipeline.py

      - name: Yeni/guncellenen sayfalari IndexNow ile bildir (Bing/Yandex)
        continue-on-error: true
        run: python ping_search_engines.py --hours 24

      - name: Kalite kapisinda reddedilenler veya hatalar varsa issue ac
        if: steps.pipeline.outcome == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Content OS Pipeline Basarisiz veya Hatalar Var - ${new Date().toISOString().slice(0,10)}`,
              body: `Lutfen detayli loglari inceleyin.\n\nLog: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["icerik-uretim-hata"],
            });

      - name: Open issue if job failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Haftalik icerik uretimi basarisiz oldu - ${new Date().toISOString().slice(0,10)}`,
              body: `Log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["icerik-uretim-hata"],
            });
