name: Haftalik Veritabani Yedegi

on:
  schedule:
    # Her Pazar 03:00 UTC (TR 06:00)
    - cron: "0 3 * * 0"
  workflow_dispatch: {}

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      issues: write
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install postgresql-client 17 (Supabase sunucusuyla surum uyumu icin)
        run: |
          sudo sh -c 'echo "deb https://apt.postgresql.org/pub/repos/apt $(lsb_release -cs)-pgdg main" > /etc/apt/sources.list.d/pgdg.list'
          curl -fsSL https://www.postgresql.org/media/keys/ACCC4CF8.asc | sudo gpg --dearmor -o /etc/apt/trusted.gpg.d/pgdg.gpg
          sudo apt-get update
          sudo apt-get install -y postgresql-client-17

      - name: Dump database
        id: dump
        run: |
          FILENAME="bulurumai-backup-$(date +%Y-%m-%d).sql"
          /usr/lib/postgresql/17/bin/pg_dump "$DATABASE_URL" --no-owner --no-privileges -f "$FILENAME"
          echo "filename=$FILENAME" >> "$GITHUB_OUTPUT"

      - name: Upload backup as artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.dump.outputs.filename }}
          path: ${{ steps.dump.outputs.filename }}
          retention-days: 90

      - name: Open issue if backup failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Haftalik veritabani yedegi basarisiz oldu - ${new Date().toISOString().slice(0,10)}`,
              body: `pg_dump calistirilamadi veya artifact yuklenemedi. Log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["pipeline-hata"],
            });
