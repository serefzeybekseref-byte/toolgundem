name: Karsilastirma Tazelik Kontrolu (aylik)

on:
  schedule:
    # Her ayin 1'i, 08:00 UTC (TR 11:00)
    - cron: "0 8 1 * *"
  workflow_dispatch: {}

jobs:
  check-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      issues: write
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check comparison freshness
        id: check
        run: python check_comparisons_freshness.py

      - name: Open issue if signals found
        if: steps.check.outputs.has_signals == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const report = `${{ steps.check.outputs.report }}`;
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Karsilastirma listeleri gozden gecirilmeli - ${new Date().toISOString().slice(0,10)}`,
              body: report,
              labels: ["karsilastirma-guncelleme"],
            });
