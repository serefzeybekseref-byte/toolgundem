name: Yeni Icerik Uretimi (haftalik)

on:
  schedule:
    # Her Pazartesi 07:00 UTC (TR 10:00)
    - cron: "0 7 * * 1"
  workflow_dispatch: {}

jobs:
  generate-content:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      issues: write
    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      GEMINI_API_KEY_2: ${{ secrets.GEMINI_API_KEY_2 }}
      GEMINI_API_KEY_3: ${{ secrets.GEMINI_API_KEY_3 }}
      GEMINI_API_KEY_4: ${{ secrets.GEMINI_API_KEY_4 }}
      GEMINI_API_KEY_5: ${{ secrets.GEMINI_API_KEY_5 }}
      NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Kategoriler buyudukce yeni karsilastirma listeleri uret
        id: comparisons
        continue-on-error: true
        run: python auto_generate_comparisons.py

      - name: Yeni koleksiyonlar (toolkit) uret
        id: collections
        continue-on-error: true
        run: python generate_collections.py

      - name: Buyuyen karsilastirma listesine gore yeni rehber uret (Guide Scheduler)
        id: guides
        continue-on-error: true
        run: python generate_guide.py --auto

      - name: Kalite kapisinda reddedilenler varsa issue ac
        if: steps.comparisons.outputs.rejected_count > 0 || steps.collections.outputs.rejected_count > 0 || steps.guides.outputs.guide_rejected_count > 0
        uses: actions/github-script@v7
        with:
          script: |
            const cReport = `${{ steps.comparisons.outputs.rejection_report }}`;
            const colReport = `${{ steps.collections.outputs.rejection_report }}`;
            const gReport = `${{ steps.guides.outputs.guide_rejection_report }}`;
            let body = "Kalite kapisi bazi otomatik uretilen icerikleri reddetti, canliya cikmadilar.\n\n";
            if (cReport.trim()) body += "## Karsilastirmalar\n" + cReport + "\n\n";
            if (colReport.trim()) body += "## Koleksiyonlar\n" + colReport + "\n\n";
            if (gReport.trim()) body += "## Rehberler\n" + gReport + "\n\n";
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Kalite kapisi bazi icerigi reddetti - ${new Date().toISOString().slice(0,10)}`,
              body: body,
              labels: ["kalite-kapisi"],
            });

      - name: Open issue if job failed
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner, repo: context.repo.repo,
              title: `Haftalik icerik uretimi basarisiz oldu - ${new Date().toISOString().slice(0,10)}`,
              body: `Log: ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ["icerik-uretim-hata"],
            });
